spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/trainer_db}
spring.datasource.username=trainer
spring.datasource.password=trainer

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true

server.port=8080

app.security.jwt.secret=${AUTH_JWT_SECRET:change-this-secret-in-env}
app.security.jwt.access-ttl-seconds=${AUTH_ACCESS_TTL_SECONDS:900}
app.security.refresh-ttl-seconds=${AUTH_REFRESH_TTL_SECONDS:604800}

app.minio.endpoint=${MINIO_ENDPOINT:http://localhost:9000}
app.minio.access-key=${MINIO_ACCESS_KEY:minioadmin}
app.minio.secret-key=${MINIO_SECRET_KEY:minioadmin}
app.minio.bucket=${MINIO_BUCKET:profile-photos}

# Настройки внешнего погодного API (OpenWeatherMap)
# Значение ключа должно поступать через переменную окружения OPENWEATHERMAP_API_KEY
external.weather.api.key=${OPENWEATHERMAP_API_KEY:}
external.weather.base-url=https://api.openweathermap.org/data/2.5
external.weather.request-timeout-ms=5000
external.weather.max-retries=2
external.weather.min-interval-ms=1000


