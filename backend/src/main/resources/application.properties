spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/trainer_db}
spring.datasource.username=trainer
spring.datasource.password=trainer

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true

server.port=8080

app.security.jwt.secret=${AUTH_JWT_SECRET:change-this-secret-in-env}
app.security.jwt.access-ttl-seconds=${AUTH_ACCESS_TTL_SECONDS:900}
app.security.refresh-ttl-seconds=${AUTH_REFRESH_TTL_SECONDS:604800}


