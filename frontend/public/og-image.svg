<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-label="Sport Planner">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#020617" />
      <stop offset="55%" stop-color="#0f172a" />
      <stop offset="100%" stop-color="#1e293b" />
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#22d3ee" />
      <stop offset="100%" stop-color="#3b82f6" />
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)" />
  <circle cx="1080" cy="-40" r="300" fill="#22d3ee" fill-opacity="0.12" />
  <circle cx="120" cy="650" r="260" fill="#3b82f6" fill-opacity="0.16" />

  <text x="90" y="230" fill="#67e8f9" font-family="Segoe UI, Arial, sans-serif" font-size="48" font-weight="600">
    SPORT PLANNER
  </text>
  <text x="90" y="320" fill="#f8fafc" font-family="Segoe UI, Arial, sans-serif" font-size="72" font-weight="700">
    Платформа для
  </text>
  <text x="90" y="400" fill="#f8fafc" font-family="Segoe UI, Arial, sans-serif" font-size="72" font-weight="700">
    тренера и спортсмена
  </text>
  <text x="90" y="480" fill="#cbd5e1" font-family="Segoe UI, Arial, sans-serif" font-size="36" font-weight="400">
    Планы • Посещаемость • Рацион • Отчеты
  </text>

  <rect x="860" y="420" width="250" height="78" rx="20" fill="url(#accent)" />
  <text x="985" y="469" text-anchor="middle" fill="#020617" font-family="Segoe UI, Arial, sans-serif" font-size="34" font-weight="700">
    START
  </text>
</svg>
